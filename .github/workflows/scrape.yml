name: Scrape restaurant leads

# Walks the world city by city: EVERY incorporated city/town in the United
# States (all 50 states + D.C.), then — once the US is fully swept — every city
# in MEXICO, writing Mexico's leads into their own freshly-created files.
# Target order + datasets live in scripts/targets.js; the committed
# state/progress.json holds the current index into that flat list.
#
# ── Schedule ──────────────────────────────────────────────────────────────────
# Runs every 5 minutes — GitHub Actions' minimum interval. The concurrency
# group (cancel-in-progress: false) ensures runs never overlap: a new trigger
# queues behind the active run, giving near-zero idle time between scrapes.
# Each run scrapes a BATCH of cities (default 25) so the ~110k-city sweep
# finishes in a sane timeframe instead of years at one-city-per-run.
#
# NOTE for private repos: GitHub Actions free tier = 2 000 min/month.
# Each run can use up to 120 min. Use a PUBLIC repo to run without limit.
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — maximum GitHub cron frequency
  workflow_dispatch:
    inputs:
      batch:
        description: 'Cities to scrape per run (more = faster sweep, longer runs)'
        required: false
        default: '25'
      depth:
        description: 'Scroll depth — higher = more results per query'
        required: false
        default: '20'
      lang:
        description: 'Language code'
        required: false
        default: 'en'
      email:
        description: 'Extract emails from each website (slower but great for outreach)'
        required: false
        default: 'true'

permissions:
  contents: write
  actions: write

# Never let two runs overlap and corrupt the progress pointer or outreach files.
# cancel-in-progress: false means a new trigger queues instead of cancelling,
# so no scraping work is ever thrown away.
concurrency:
  group: scrape-world
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120          # 2-hour ceiling per run
    env:
      BATCH:        ${{ github.event.inputs.batch || '15' }}
      DEPTH:        ${{ github.event.inputs.depth || '20' }}
      LANG_CODE:    ${{ github.event.inputs.lang  || 'en' }}
      EMAIL:        ${{ github.event.inputs.email || 'true' }}
      # Per-city hard cap (seconds). BATCH × CITY_TIMEOUT must stay under the
      # 120-min job ceiling so the Advance/Commit steps always run → no repeats.
      # 15 × 300s = 75 min worst case.
      CITY_TIMEOUT: '300'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Picks the next BATCH of cities and WRITES queries.txt itself.
      - name: Pick next batch of cities
        id: pick
        run: node scripts/pick-target.js

      # ── HARD STOP: every city of every country already scraped ────────────────
      - name: All targets done — disable workflow (hard stop)
        if: steps.pick.outputs.done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice::Every city in every country scraped. Disabling workflow (hard stop)."
          gh workflow disable "Scrape restaurant leads" --repo "$GITHUB_REPOSITORY" || \
            gh workflow disable scrape.yml --repo "$GITHUB_REPOSITORY"

      # ── Normal run: scrape the current batch ─────────────────────────────────
      - name: Show batch
        if: steps.pick.outputs.done == 'false'
        run: |
          echo "Country: ${{ steps.pick.outputs.country }}"
          echo "Batch:   ${{ steps.pick.outputs.count }} cities (index ${{ steps.pick.outputs.index }})"
          echo "Outputs: ${{ steps.pick.outputs.phonesFile }} / ${{ steps.pick.outputs.emailsFile }}"
          echo "Queries:" && cat queries.txt

      - name: Install loader deps
        if: steps.pick.outputs.done == 'false'
        run: npm install --no-audit --no-fund

      # Scrape ONE city per docker run, then EXTRACT + ADVANCE + COMMIT+PUSH that
      # single city before touching the next. Why per-city instead of per-batch:
      # if the run is cut off (job timeout, runner death, quota), every city that
      # already finished is durably saved & pushed — at most the one in-flight city
      # is lost. Each single-query job also completes and flushes cleanly (the old
      # multi-query run + -exit-on-inactivity raced and wrote 0 bytes).
      #
      # Every city is wrapped so it CANNOT fail the job:
      #   • `timeout` caps a slow/blocked city so it can't stall the batch
      #   • `|| ...` swallows timeouts, blocks, crashes, zero-result exits
      #   • empty output → skip, but STILL advance so we never repeat it
      # Whatever a city yields — nothing, a little, or a lot — we save & move on.
      - name: Scrape + save each city (durable, resilient)
        id: sweep
        if: steps.pick.outputs.done == 'false'
        env:
          PHONES_FILE:  ${{ steps.pick.outputs.phonesFile }}
          EMAILS_FILE:  ${{ steps.pick.outputs.emailsFile }}
          MONGODB_URI:  ${{ secrets.MONGODB_URI }}
          MONGODB_DB:   ${{ secrets.MONGODB_DB }}
          LEADS_QUERY:  ${{ steps.pick.outputs.country }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p out
          : > out/results.jsonl
          EMAIL_FLAG=""
          [ "$EMAIL" = "true" ] && EMAIL_FLAG="-email"
          total=$(grep -c . queries.txt || echo 0)
          i=0
          last_flag=false
          while IFS= read -r q; do
            [ -z "$q" ] && continue
            i=$((i + 1))
            echo "::group::[$i/$total] $q"
            printf '%s\n' "$q" > .one.txt
            rm -f out/city.json out/city.jsonl

            # ── scrape one city ──
            timeout "${CITY_TIMEOUT}s" docker run --rm \
              -v "$PWD/.one.txt:/q.txt:ro" \
              -v "$PWD/out:/out" \
              gosom/google-maps-scraper \
              -input /q.txt -results /out/city.json -json \
              -depth "$DEPTH" -lang "$LANG_CODE" $EMAIL_FLAG || \
              echo "  ⚠ city errored/timed out — skipping"

            # ── normalise (JSON array OR json-lines) → one object per line ──
            if [ -s out/city.json ]; then
              node -e '
                const fs=require("fs");
                let t=fs.readFileSync(process.argv[1],"utf8").trim();
                if(!t) process.exit(0);
                let arr;
                try { const p=JSON.parse(t); arr=Array.isArray(p)?p:[p]; }
                catch { arr=t.split("\n").map(l=>l.trim()).filter(Boolean)
                          .map(l=>{try{return JSON.parse(l)}catch{return null}}).filter(Boolean); }
                for (const o of arr) fs.appendFileSync(process.argv[2], JSON.stringify(o)+"\n");
                console.error("  ✔ "+arr.length+" places");
              ' out/city.json out/city.jsonl || echo "  ⚠ parse failed"
            fi

            # ── save this city's leads (per-country files + optional Mongo) ──
            if [ -s out/city.jsonl ]; then
              node scripts/extract.js out/city.jsonl || true
              [ -n "$MONGODB_URI" ] && node scripts/to-mongo.js out/city.jsonl || true
              cat out/city.jsonl >> out/results.jsonl
            else
              echo "  ✘ no results"
            fi

            # ── advance pointer by this ONE city (GITHUB_OUTPUT unset so the loop
            #    doesn't spam step outputs; we parse its stdout instead) ──
            adv="$(GITHUB_OUTPUT='' node scripts/advance.js 2>&1)"; echo "$adv"
            echo "$adv" | grep -q '^last=true' && last_flag=true
            if echo "$adv" | grep -qE '^newCountry=[A-Za-z]'; then
              nc="$(echo "$adv" | sed -n 's/^newCountry=//p')"
              echo "::notice::A country just completed — now starting ${nc} into its own files."
            fi

            # ── durably commit + push this city before moving on ──
            git add whatsapp*.txt gmail*.txt state/progress.json
            if ! git diff --cached --quiet; then
              git commit -q -m "leads: ${LEADS_QUERY} — ${q}"
              git push -q || { git pull --rebase --autostash -q && git push -q; } || \
                echo "  ⚠ push failed — will retry on next city"
            fi
            echo "::endgroup::"
          done < queries.txt
          rm -f .one.txt out/city.json out/city.jsonl
          echo "Run total places:" && wc -l < out/results.jsonl || true
          echo "last=${last_flag}" >> "$GITHUB_OUTPUT"

      - name: Upload raw results (download)
        if: ${{ always() && steps.pick.outputs.done == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: leads-${{ steps.pick.outputs.label || 'run' }}
          path: out/results.jsonl
          if-no-files-found: warn

      # ── HARD STOP: that batch finished the final country ──────────────────────
      - name: Final country finished — disable workflow (hard stop)
        if: steps.sweep.outputs.last == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice::Final country fully scraped. Disabling workflow (hard stop)."
          gh workflow disable "Scrape restaurant leads" --repo "$GITHUB_REPOSITORY" || \
            gh workflow disable scrape.yml --repo "$GITHUB_REPOSITORY"
